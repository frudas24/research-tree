version: "2"

run:
  timeout: 5m
  tests: true

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - revive
    - unused
    - gocritic
  settings:
    govet:
      enable:
        - unusedwrite
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    paths:
      - dist
      - vendor
      - .gocache
      - .golangci-cache
      - ".*\\.pb\\.go"
      - "cmd/rt-bridge/main.go"

issues:
  max-issues-per-linter: 0
  max-same-issues: 10
