version: 2

builds:
  - id: rt
    main: ./cmd/rt
    binary: rt
    ldflags:
      - -s -w
      - -X github.com/frudas24/research-tree/cmd/rt/cmds.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0

  - id: bridge-linux
    main: ./cmd/rt-bridge
    binary: libretree
    buildmode: c-shared
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1

  - id: bridge-win-amd64
    main: ./cmd/rt-bridge
    binary: libretree
    buildmode: c-shared
    goos:
      - windows
    goarch:
      - amd64
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc

  - id: bridge-win-arm64
    main: ./cmd/rt-bridge
    binary: libretree
    buildmode: c-shared
    goos:
      - windows
    goarch:
      - arm64
    env:
      - CGO_ENABLED=1
      - CC=aarch64-w64-mingw32-gcc

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - docs/*
    builds_info:
      mode: 0644

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  prerelease: auto
