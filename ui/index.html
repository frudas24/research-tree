<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Research Tree — Graph</title>
<link rel="stylesheet" href="assets/css/style.css"/>
<style>
  .dimmed { opacity: 0.2; transition: opacity 0.3s; }
  #sidebar { transition: transform 0.25s ease; }
  #sidebar.collapsed { transform: translateX(100%); }
  #sidebar.collapsed ~ #cy { right: 0; }
  #sidebar { right: 0; }
  #sidebar-toggle {
    position: absolute; right: 290px; top: 48px; z-index: 20;
    background: var(--card); color: var(--fg); border: 1px solid var(--muted);
    border-radius: 6px 0 0 6px; padding: 6px 8px; cursor: pointer; font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <strong>Research Tree</strong>
  <span>·</span>
  <span id="cyHint" class="pill pill-ok">—</span>
  <span>·</span>
  <button id="btnPause">Pause</button>
  <span>·</span>
  <label>Filter
    <input id="txtFilter" type="text" placeholder="title, tag, scope..." style="width:180px"/>
  </label>
  <label>Status
    <select id="selStatus">
      <option value="">All</option>
      <option value="active">Active</option>
      <option value="done">Done</option>
      <option value="paused">Paused</option>
    </select>
  </label>
  <label>Claim
    <select id="selClaim">
      <option value="">All</option>
      <option value="validated">Validated</option>
      <option value="provisional">Provisional</option>
      <option value="invalidated">Invalidated</option>
      <option value="superseded">Superseded</option>
    </select>
  </label>
  <span>·</span>
  <label>Poll
    <select id="selPollInterval">
      <option value="5000">5s</option>
      <option value="10000" selected>10s</option>
      <option value="30000">30s</option>
      <option value="60000">60s</option>
    </select>
  </label>
  <button id="btnRefresh" title="Force refresh" style="margin-left:6px">&#x21bb;</button>
  <button id="btnSidebar" title="Toggle sidebar">&#x25C0;</button>
</header>

<div id="cy"></div>

<aside id="sidebar" class="collapsed">
  <h3>Hotspots</h3>
  <ul id="hotspotList" style="list-style:none;padding:0;margin:0"></ul>
  <div id="nodeDetail" style="display:none; margin-top:10px; padding:8px; background:#0d131a; border-radius:8px; border:1px solid var(--muted); font-size:11px; line-height:1.5; max-height:60vh; overflow-y:auto"></div>
</aside>

<div id="legend" class="legend"></div>

<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.33.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/elkjs@0.9.0/lib/elk.bundled.js"></script>
<script src="assets/js/flow/cytoscape-elk.js"></script>
<script>
  try {
    if (window.cytoscape && window.cytoscapeElk && typeof window.cytoscape.use === 'function') {
      window.cytoscape.use(window.cytoscapeElk);
    }
  } catch(e) { console.warn('cytoscape-elk registration failed', e); }

  function adjustLayout() {
    const h = document.querySelector('header');
    const cyEl = document.getElementById('cy');
    const sb = document.getElementById('sidebar');
    if (h && cyEl) {
      const topPx = h.offsetHeight + 'px';
      cyEl.style.top = topPx;
      if (sb) sb.style.top = topPx;
    }
  }
  window.addEventListener('load', adjustLayout);
  window.addEventListener('resize', adjustLayout);

  // Sidebar toggle
  document.addEventListener('DOMContentLoaded', () => {
    const sidebar = document.getElementById('sidebar');
    const btn = document.getElementById('btnSidebar');
    if (btn && sidebar) {
      btn.onclick = () => {
        sidebar.classList.toggle('collapsed');
        btn.textContent = sidebar.classList.contains('collapsed') ? '\u25C0' : '\u25B6';
        adjustLayout();
      };
    }
  });
</script>

<script type="module">
  import { bootCy } from './assets/js/flow/graph.js';
  document.getElementById('btnRefresh').onclick = () => location.reload();
  bootCy(document.getElementById('cy'));
</script>
</body>
</html>
