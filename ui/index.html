<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Research Tree — Graph</title>
<link rel="stylesheet" href="assets/css/style.css"/>
<style>
  .dimmed { opacity: 0.2; transition: opacity 0.3s; }
  #sidebar { transition: transform 0.25s ease; }
  #sidebar.collapsed { transform: translateX(100%); }
  #nodeDetail {
    position: absolute; right: 10px; top: 50px; width: 340px; max-height: 78vh;
    background: rgba(17,22,29,0.97); border: 1px solid var(--muted); border-radius: 12px;
    padding: 14px 14px 14px 14px; font-size: 11px; line-height: 1.55;
    overflow-y: auto; overflow-x: hidden; z-index: 15;
    display: none; box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
  }
  #nodeDetail .close-btn {
    position: sticky; float: right; top: 0; margin: -8px -8px 0 0;
    background: var(--card); border: 1px solid var(--muted); border-radius: 6px;
    color: var(--fg); cursor: pointer; font-size: 14px; padding: 2px 8px; z-index: 2;
  }
  #nodeDetail .close-btn:hover { background: #1a2332; }
</style>
</head>
<body>

<header>
  <strong>Research Tree</strong>
  <span>·</span>
  <span id="cyHint" class="pill pill-ok">—</span>
  <span>·</span>
  <button id="btnPause">Pause</button>
  <span>·</span>
  <label>Filter
    <input id="txtFilter" type="text" placeholder="id, title, tag, scope, agent..." style="width:200px"/>
  </label>
  <label>Status
    <select id="selStatus">
      <option value="all">All</option>
      <option value="active">Active</option>
      <option value="done">Done</option>
      <option value="paused">Paused</option>
    </select>
  </label>
  <label>Claim
    <select id="selClaim">
      <option value="all">All</option>
      <option value="validated">Validated</option>
      <option value="provisional">Provisional</option>
      <option value="invalidated">Invalidated</option>
      <option value="superseded">Superseded</option>
    </select>
  </label>
  <span>·</span>
  <label>Poll
    <select id="selPollInterval">
      <option value="5000">5s</option>
      <option value="10000" selected>10s</option>
      <option value="30000">30s</option>
      <option value="60000">60s</option>
    </select>
  </label>
  <button id="btnRefresh" title="Force refresh">&#x21bb;</button>
  <button id="btnDetail" title="Toggle node detail panel">&#x1F4CB; Detail</button>
  <button id="btnSidebar" title="Toggle hotspot sidebar">&#x25C0; Hot</button>
</header>

<div id="cy"></div>

<aside id="sidebar" class="collapsed">
  <h3>Hotspots</h3>
  <ul id="hotspotList" style="list-style:none;padding:0;margin:0"></ul>
</aside>

<div id="nodeDetail">
  <button class="close-btn" id="btnDetailClose">&times;</button>
  <div id="nodeDetailContent">Click a node to see details</div>
</div>

<div id="legend" class="legend"></div>

<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.33.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/elkjs@0.9.0/lib/elk.bundled.js"></script>
<script src="assets/js/flow/cytoscape-elk.js"></script>
<script>
  try {
    if (window.cytoscape && window.cytoscapeElk && typeof window.cytoscape.use === 'function') {
      window.cytoscape.use(window.cytoscapeElk);
    }
  } catch(e) { console.warn('cytoscape-elk registration failed', e); }

  function adjustLayout() {
    const h = document.querySelector('header');
    const cyEl = document.getElementById('cy');
    const sb = document.getElementById('sidebar');
    const nd = document.getElementById('nodeDetail');
    if (h && cyEl) {
      const topPx = h.offsetHeight + 'px';
      cyEl.style.top = topPx;
      if (sb) sb.style.top = topPx;
      if (nd) nd.style.top = (h.offsetHeight + 8) + 'px';
    }
  }
  window.addEventListener('load', adjustLayout);
  window.addEventListener('resize', adjustLayout);
</script>

<script type="module">
  import { bootCy } from './assets/js/flow/graph.js';
  document.getElementById('btnRefresh').onclick = () => location.reload();
  document.getElementById('btnDetailClose').onclick = () => {
    document.getElementById('nodeDetail').style.display = 'none';
  };
  bootCy(document.getElementById('cy'));
</script>
</body>
</html>
