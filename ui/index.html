<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Research Tree — Graph</title>
<link rel="stylesheet" href="assets/css/style.css"/>
<style>
  .dimmed { opacity: 0.2; transition: opacity 0.3s; }
</style>
</head>
<body>

<header>
  <strong>Research Tree</strong>
  <span>·</span>
  <span id="cyHint" class="pill pill-ok">—</span>
  <span>·</span>
  <button id="btnPause">Pause</button>
  <span>·</span>
  <label>Filter
    <input id="txtFilter" type="text" placeholder="title, tag, scope..." style="width:200px"/>
  </label>
  <label>Status
    <select id="selStatus">
      <option value="">All</option>
      <option value="active">Active</option>
      <option value="done">Done</option>
      <option value="paused">Paused</option>
    </select>
  </label>
  <label>Claim
    <select id="selClaim">
      <option value="">All</option>
      <option value="validated">Validated</option>
      <option value="provisional">Provisional</option>
      <option value="invalidated">Invalidated</option>
      <option value="superseded">Superseded</option>
    </select>
  </label>
  <span>·</span>
  <label>Poll
    <select id="selPollInterval">
      <option value="5000">5s</option>
      <option value="10000" selected>10s</option>
      <option value="30000">30s</option>
      <option value="60000">60s</option>
    </select>
  </label>
  <button id="btnRefresh" title="Force refresh" style="margin-left:6px">&#x21bb; Refresh</button>
</header>

<div id="cy"></div>

<aside id="sidebar">
  <h3>Hotspots</h3>
  <ul id="hotspotList" style="list-style:none;padding:0;margin:0"></ul>

  <div id="nodeDetail" style="display:none; margin-top:10px; padding:8px; background:#0d131a; border-radius:8px; border:1px solid var(--muted)"></div>
</aside>

<div id="legend" class="legend"></div>

<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.33.1/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/elkjs@0.9.0/lib/elk.bundled.js"></script>
<script src="assets/js/flow/cytoscape-elk.js"></script>
<script>
  // Register cytoscape-elk
  try {
    if (window.cytoscape && window.cytoscapeElk && typeof window.cytoscape.use === 'function') {
      window.cytoscape.use(window.cytoscapeElk);
    }
  } catch(e) { console.warn('cytoscape-elk registration failed', e); }

  // Adjust #cy top to header height
  function adjustLayout() {
    const h = document.querySelector('header');
    const cyEl = document.getElementById('cy');
    const sb = document.getElementById('sidebar');
    if (h && cyEl) {
      const topPx = h.offsetHeight + 'px';
      cyEl.style.top = topPx;
      if (sb) sb.style.top = topPx;
    }
  }
  window.addEventListener('load', adjustLayout);
  window.addEventListener('resize', adjustLayout);
</script>

<script type="module">
  import { bootCy } from './assets/js/flow/graph.js';

  const btnRefresh = document.getElementById('btnRefresh');

  const cy = await bootCy(document.getElementById('cy'));

  if (btnRefresh) {
    btnRefresh.onclick = () => location.reload();
  }
</script>
</body>
</html>
